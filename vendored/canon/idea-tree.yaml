# ─── Counts and integrity ──────────────────────────────────────────────────
#
# Leaves per branch (SUR-624: +1 Mind, +3 Self, +2 Knowledge & Systems,
#   +2 Action & Work, +2 Power & Society):
#   Mind:                 12
#   Self:                 15
#   Knowledge & Systems:  14
#   Action & Work:        13
#   Power & Society:       15
#   Relationships & Ethics: 9
#   Time & Change:         8
#   World & Meaning:      11
#   TOTAL:                97 ✓
#
# Per top: Inner Life 27 · Thinking & Doing 27 · Living Together 24 · The World 19
#
# new: true (21) — SUR-597 (11): Bias, Uncertainty, Resilience, Models, Information,
#   Complexity, Emergence, Systems, Feedback, Incentives, Entropy.
#   SUR-624 (10): Teachability, Acceptance, Self-Compassion, Sufficiency,
#   Understanding, Externalized Cognition, Decision Quality, Positioning,
#   Representation, Restitution.
#
# crossBranch: true (6, SUR-624) — Teachability, Self-Compassion, Externalized
#   Cognition, Decision Quality, Representation, Restitution.
#
# aliases (21 across 15 leaves) — dropped classical leaves routed to their nearest
#   contemporary target for search only (Canon disposition map, SUR-597), plus the
#   SUR-624 search alias Decision Quality ← Resulting:
#     Reasoning ← Philosophy
#     Uncertainty ← Necessity and Contingency
#     Identity ← Same and Other
#     Evidence ← Science
#     Language ← Definition
#     Models ← Idea, Mathematics, Principle
#     Systems ← Relation
#     Conflict ← Opposition
#     Care ← Medicine
#     Time ← Eternity
#     Cycles ← Fate
#     Nature ← Astronomy, Space
#     Energy ← Element, Matter, Mechanics, Physics
#     the Sacred ← Angel
#     Decision Quality ← Resulting   (SUR-624; not a classical drop — a modern alias)
#   Six dropped leaves carry no alias (no defensible target): Being, Infinity,
#   One and Many, Quality, Quantity, Universal and Particular.
#
# ─── Provenance ────────────────────────────────────────────────────────────
