# Surfc Idea Tree — canopy lookup (CONTEMPORARY canon)
#
# SUR-597: replaces the Adler-derived classical canon (3 tops / 8 middles / 102
# leaves; SUR-481/505) with a contemporary canon chosen to match how people read
# non-fiction today. The shipped architecture is PRESERVED — top → middle → leaf,
# connections at the leaf only, the standing "Ideas You Bring" branch — only the
# content, ids, and counts change.
#
# STRUCTURE
#   Level 1 (top):     4 categories  (+ the hardcoded "Ideas You Bring")
#   Level 2 (middle):  8 branches    (+ the hardcoded "your_ideas")
#   Level 3 (leaf):    97 leaves     (+ the user's dynamic custom ideas)
#                      (SUR-597 shipped 87; SUR-624 added 10 — see LEAF FLAGS)
#
# CONNECTION SEMANTICS (load-bearing, unchanged)
#   Connections (Spark / Tension Map / Idea Discovery) live ONLY at the leaf
#   level. Middle and top nodes are render-time rollups, never stored edges.
#
# LEAF FLAGS
#   new:     true  — no classical ancestor (the "0:1" bucket). 21 leaves (11 from
#                    SUR-597 + the 10 SUR-624 additions, which are all new). These
#                    receive no migrated tag and launch empty (render at MIN_PX
#                    in the cloud until re-tagging or a re-discovery pass fills
#                    them). Probability (← Chance) and Status (← Honor) are NOT
#                    new — the reconciled Canon disposition map ties them to
#                    classical ancestors, so they inherit migrated tags.
#   crossBranch: true — SUR-624 marker for a leaf that does not sit cleanly under a
#                    single branch (provisionally placed; "lives across branches").
#                    6 leaves: Teachability, Self-Compassion, Externalized Cognition,
#                    Decision Quality, Representation, Restitution. Rendered with a
#                    trailing "*" in the tree/picker (render is a tracked follow-up;
#                    the data flag lands here). Distinct from new: true — a leaf can
#                    be both. A later ticket lets users choose the mapping themselves.
#   aliases: [...]  — old classical leaf names that were DROPPED onto this leaf
#                    as the nearest contemporary target. Search-only: an alias
#                    does NOT migrate a tag, it only lets the old search term land
#                    on this leaf in the idea picker (AddIdeaSheet, via
#                    getLeafMeta().aliases). 20 SUR-597 aliases across 14 leaves
#                    (+ SUR-624: Decision Quality ← Resulting).
#
# SOURCE OF TRUTH
#   The leaf set here must exactly equal GREAT_IDEAS (src/constants.js); the
#   ideaTree.js loader throws on drift. The 4th top "bring" and its middle
#   "your_ideas" are NOT in this file — they are hardcoded in ideaTree.js because
#   their leaves are the user's custom ideas, read dynamically from Dexie.

version: 2
top_categories:
  - id: inner_life
    label: "Inner Life"
    description: "The mind and the self — how we think and who we are."
    children: [mind, self]

  - id: thinking_doing
    label: "Thinking & Doing"
    description: "How we know the world and how we act in it."
    children: [knowledge_systems, action_work]

  - id: living_together
    label: "Living Together"
    description: "Power, society, and the ethics of life with others."
    children: [power_society, relationships_ethics]

  - id: the_world
    label: "The World"
    description: "Time, change, and the meaning of the world around us."
    children: [time_change, world_meaning]

middle_nodes:

  # ─── Inner Life ─────────────────────────────────────────────────────────

  - id: mind
    label: "Mind"
    parent: inner_life
    leaves:
      - { name: "Attention" }
      - { name: "Memory" }
      - { name: "Learning" }
      - { name: "Reasoning", aliases: ["Philosophy"] }
      - { name: "Judgment" }
      - { name: "Creativity" }
      - { name: "Curiosity" }
      - { name: "Intuition" }
      - { name: "Bias", new: true }
      - { name: "Uncertainty", new: true, aliases: ["Necessity and Contingency"] }
      - { name: "Expertise" }
      - { name: "Teachability", new: true, crossBranch: true }

  - id: self
    label: "Self"
    parent: inner_life
    leaves:
      - { name: "Identity", aliases: ["Same and Other"] }
      - { name: "Emotion" }
      - { name: "Motivation" }
      - { name: "Habit" }
      - { name: "Discipline" }
      - { name: "Anxiety" }
      - { name: "Resilience", new: true }
      - { name: "Purpose" }
      - { name: "Authenticity" }
      - { name: "Vulnerability" }
      - { name: "Desire" }
      - { name: "Consciousness" }
      - { name: "Acceptance", new: true }
      - { name: "Self-Compassion", new: true, crossBranch: true }
      - { name: "Sufficiency", new: true }

  # ─── Thinking & Doing ───────────────────────────────────────────────────

  - id: knowledge_systems
    label: "Knowledge & Systems"
    parent: thinking_doing
    leaves:
      - { name: "Truth" }
      - { name: "Evidence", aliases: ["Science"] }
      - { name: "Explanation" }
      - { name: "Language", aliases: ["Definition"] }
      - { name: "Narrative" }
      - { name: "Models", new: true, aliases: ["Idea", "Mathematics", "Principle"] }
      - { name: "Information", new: true }
      - { name: "Complexity", new: true }
      - { name: "Emergence", new: true }
      - { name: "Systems", new: true, aliases: ["Relation"] }
      - { name: "Causation" }
      - { name: "Probability" }
      - { name: "Understanding", new: true }
      - { name: "Externalized Cognition", new: true, crossBranch: true }

  - id: action_work
    label: "Action & Work"
    parent: thinking_doing
    leaves:
      - { name: "Decision" }
      - { name: "Strategy" }
      - { name: "Risk" }
      - { name: "Mastery" }
      - { name: "Failure" }
      - { name: "Innovation" }
      - { name: "Feedback", new: true }
      - { name: "Incentives", new: true }
      - { name: "Leadership" }
      - { name: "Collaboration" }
      - { name: "Productivity" }
      - { name: "Decision Quality", new: true, crossBranch: true, aliases: ["Resulting"] }
