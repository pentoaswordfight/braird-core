# Founder decision (SUR-597). Contemporary non-fiction trends toward mindful
# self-help, historical investigation, expert scenario analysis, and thoughtful
# memoir; the classics-aimed Adler canon served only a narrow subset of readers.
# Per-leaf 102 → 87 disposition: the "Canon disposition map — classical 102 →
# contemporary 87 (reconciled)" attachment on SUR-597 (founder-ratified 2026-06-14).
