distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
# Gradle 9.5, not 9.6.x: AGP 8.x relies on a Gradle internal API removed in 9.6.0. This is the
# newest Gradle line the AGP 8.13 plugin supports (the desktop bindings/kotlin build stays on
# 9.6.1 — separate wrapper, no conflict). Revisit when AGP ships a 9.6-clean release.
distributionUrl=https\://services.gradle.org/distributions/gradle-9.5.0-bin.zip
networkTimeout=10000
retries=0
retryBackOffMs=500
validateDistributionUrl=false
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
