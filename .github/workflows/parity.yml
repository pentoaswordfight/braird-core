name: Parity

# Per-PR crypto-parity gate (Linux). The core is one Rust crate; Swift/Kotlin are
# generated bindings over it, so ALL crypto parity is gated here per-PR — a PR
# cannot merge crypto-broken. Only the iOS *packaging* leg is deferred to nightly
# (see nightly-macos.yml).
#
# Path-filtered to crypto-relevant files AND guarded on the presence of Cargo.toml,
# so the repo's scaffolding-only bootstrap commit (docs + workflows) stays green
# until the crate lands.

on:
  push:
    branches: [main]
    paths: ['Cargo.toml', 'Cargo.lock', 'build.rs', 'src/**', 'tests/**', 'vendored/**', '**/*.udl']
  pull_request:
    branches: [main]
    paths: ['Cargo.toml', 'Cargo.lock', 'build.rs', 'src/**', 'tests/**', 'vendored/**', '**/*.udl']
  workflow_dispatch:

jobs:
  parity:
    name: cargo test + clippy + wasm + normalization fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — skip until the crate exists
        id: guard
        run: |
          if [ -f Cargo.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml yet — scaffolding only, skipping the parity build."
          fi

      - name: Install Rust toolchain
        if: steps.guard.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        if: steps.guard.outputs.ready == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Format check
        if: steps.guard.outputs.ready == 'true'
        run: cargo fmt --all --check

      - name: Clippy (warnings = errors)
        if: steps.guard.outputs.ready == 'true'
        run: cargo clippy --all-targets -- -D warnings

      # The normalization differential fuzz diffs the Rust port against the V8
      # `normalizeForTag` oracle, which MUST run at the parity anchor (Unicode 17.0).
      # The runner's default Node lags, so pin it and fail loudly if it isn't 17.0.
      - name: Pin Node to the parity anchor (Unicode 17.0)
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'

      - name: Verify Node carries the Unicode 17.0 anchor
        if: steps.guard.outputs.ready == 'true'
        run: |
          uni=$(node -p 'process.versions.unicode')
          echo "node $(node --version), Unicode $uni"
          [ "$uni" = "17.0" ] || { echo "::error::Node Unicode is $uni; the differential-fuzz anchor is 17.0"; exit 1; }

      - name: Parity tests + normalization differential fuzz (foreign-decrypt, rewrap, seal, zeroization)
        if: steps.guard.outputs.ready == 'true'
        run: cargo test --all-features

      - name: WASM build check (CSPRNG via getrandom `js`)
        if: steps.guard.outputs.ready == 'true'
        run: cargo build --target wasm32-unknown-unknown

  kotlin-roundtrip:
    name: Kotlin/JVM round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — skip until the bindings exist
        id: guard
        run: |
          if [ -d bindings/kotlin ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No bindings/kotlin yet — skipping the Kotlin round-trip."
          fi

      # JVM is cross-platform, so Android-binding parity runs per-PR here on Linux —
      # it does NOT wait for the nightly macOS job. Steps activate once bindings land.
      - name: Set up JDK
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Rust toolchain
        if: steps.guard.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Kotlin/JVM round-trip (uniffi bindings over the same vectors)
        if: steps.guard.outputs.ready == 'true'
        working-directory: bindings/kotlin
        run: ./gradlew test --no-daemon

  # SUR-723: bundled SQLite (rusqlite) is the first C-compile in the crate. The Linux
  # parity job can't catch a break on the mobile target triples, and the nightly-macos
  # xcframework job only runs after merge — so smoke-build the two primary device triples
  # per-PR. A C-compile failure fails the PR, not the next nightly. (The sim / other-arch
  # triples would surface the same compile error, so one arm64 triple per platform suffices.)
  ios-crosscompile:
    name: iOS cross-compile smoke (aarch64-apple-ios)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — skip until the crate exists
        id: guard
        run: |
          if [ -f Cargo.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml yet — scaffolding only, skipping the iOS smoke build."
          fi

      - name: Install Rust toolchain + iOS target
        if: steps.guard.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache cargo
        if: steps.guard.outputs.ready == 'true'
        uses: Swatinem/rust-cache@v2

      - name: cargo build --target aarch64-apple-ios (bundled SQLite must compile)
        if: steps.guard.outputs.ready == 'true'
        run: cargo build --target aarch64-apple-ios

  android-crosscompile:
    name: Android cross-compile smoke (aarch64-linux-android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard — skip until the crate exists
        id: guard
        run: |
          if [ -f Cargo.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No Cargo.toml yet — scaffolding only, skipping the Android smoke build."
          fi

      - name: Install Rust toolchain + Android target
        if: steps.guard.outputs.ready == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo
        if: steps.guard.outputs.ready == 'true'
        uses: Swatinem/rust-cache@v2

      # Point cc + the linker at the runner's preinstalled NDK so bundled SQLite's C
      # cross-compiles for the Android triple (no device/emulator needed). API 24 = min.
      - name: cargo build --target aarch64-linux-android (bundled SQLite must compile)
        if: steps.guard.outputs.ready == 'true'
        run: |
          NDK_BIN="$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export CC_aarch64_linux_android="$NDK_BIN/aarch64-linux-android24-clang"
          export AR_aarch64_linux_android="$NDK_BIN/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$NDK_BIN/aarch64-linux-android24-clang"
          cargo build --target aarch64-linux-android
