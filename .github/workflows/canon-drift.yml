name: Canon (GREAT_IDEAS + idea tree) drift check

# SUR-918 Canon-102 awareness. Fails if either vendored canon fixture diverges
# from surfc/main, or if the live idea-tree leaf names no longer set-match the
# live GREAT_IDEAS list. JSON order and YAML bytes are both load-bearing.
#
# The single source of truth is surfc; this repo vendors GREAT_IDEAS as
# vendored/canon/great-ideas.json and src/constants/surfc-idea-tree.yaml as
# vendored/canon/idea-tree.yaml. Missing fixtures are drift failures.
#
# Requires the SURFC_READ_PAT secret (cross-repo read-only PAT).

on:
  # Per-PR: re-check both fixtures from surfc/main on every PR to main.
  pull_request:
    branches: [main]
  # On push to the guarded paths (a fixture / script / workflow change on any branch).
  push:
    paths:
      - 'vendored/canon/**'
      - 'scripts/extract-great-ideas.mjs'
      - '.github/workflows/canon-drift.yml'
  # Weekly: catches surfc-side drift while this repo is static.
  schedule:
    - cron: '0 9 * * 1' # Monday 09:00 UTC (with the crypto + schema drift checks)
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'

      # Depth 1 is enough: the checker reads src/constants.js and the idea-tree YAML.
      - name: Fetch surfc/main sources
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.SURFC_READ_PAT }}@github.com/braird/surfc.git" \
            /tmp/surfc

      - name: Assert canon fixtures and live leaf set have not drifted from surfc/main
        run: >-
          node scripts/extract-great-ideas.mjs /tmp/surfc
          --check vendored/canon/great-ideas.json
          --tree vendored/canon/idea-tree.yaml
