name: Release

# SUR-760: on a version tag, build + publish the pinned artifacts (Android AAR + desktop JVM jar)
# to a GitHub Release with a SHA-256 per artifact. Consumers pin the tag + checksums; the
# `chore(core): pin braird-core vX.Y.Z` PR in the app repo is the integration gate (docs/pinning.md).
# Written generically (a staged `dist/` + one SHA256SUMS manifest) so the future iOS xcframework
# release attaches to the same tag with no redesign. Routed to release-integrity-reviewer
# (GATING.md §3.1): binding↔native atomicity, tag+SHA-256 pin, 16 KB alignment, version agreement.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build a release for, e.g. v0.1.0'
        required: true

permissions:
  contents: write

env:
  NDK_PIN: '28.2.13676358'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Resolve version (tag without the leading v)
        id: v
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # Fail-closed: the tag, the crate version, and the CHANGELOG must agree before anything ships.
      - name: Verify tag == Cargo.toml version
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if [ "${{ steps.v.outputs.version }}" != "$CARGO_VER" ]; then
            echo "::error::tag ${{ steps.v.outputs.version }} != Cargo.toml version $CARGO_VER — bump the crate + CHANGELOG in the release commit"
            exit 1
          fi
          grep -q "\[${{ steps.v.outputs.version }}\]" CHANGELOG.md || {
            echo "::error::CHANGELOG.md has no [${{ steps.v.outputs.version }}] section"; exit 1; }

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install pinned NDK ${{ env.NDK_PIN }} (16 KB-aligned)
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_PIN}" >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_PIN}" >> "$GITHUB_ENV"

      - name: Build AAR (cross-compile → assemble → 16 KB alignment check)
        run: bash scripts/build-aar.sh "${{ steps.v.outputs.version }}"

      - name: Build the self-contained desktop jar
        working-directory: bindings/kotlin
        run: ./gradlew jar --no-daemon -PcoreVersion=${{ steps.v.outputs.version }}

      - name: Stage artifacts + SHA-256 manifest
        run: |
          cp "bindings/kotlin/build/libs/braird-core-desktop-${{ steps.v.outputs.version }}.jar" dist/
          ( cd dist && sha256sum braird-core-*.aar braird-core-desktop-*.jar | tee SHA256SUMS.txt )

      # Prove the EXACT bytes we're about to publish are self-contained: no jna.library.path, the
      # consumer resolves the native from the jar alone.
      - name: Consumer round-trip against the built desktop jar
        working-directory: bindings/consumer-smoke
        run: >
          ./gradlew test --no-daemon
          -PcoreVersion=${{ steps.v.outputs.version }}
          -PcoreJar="$GITHUB_WORKSPACE/dist/braird-core-desktop-${{ steps.v.outputs.version }}.jar"

      - name: Publish GitHub Release + attach artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=(
            "dist/braird-core-${{ steps.v.outputs.version }}.aar"
            "dist/braird-core-desktop-${{ steps.v.outputs.version }}.jar"
            "dist/SHA256SUMS.txt"
          )
          if gh release view "${{ steps.v.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.v.outputs.tag }}" "${FILES[@]}" --clobber
          else
            gh release create "${{ steps.v.outputs.tag }}" "${FILES[@]}" \
              --title "braird-core ${{ steps.v.outputs.tag }}" \
              --verify-tag \
              --notes "Pinned Android AAR (arm64-v8a + x86_64, 16 KB-aligned) + self-contained desktop JVM jar for braird-android. Add JNA >= 5.17.0 @aar alongside the AAR. Pin/bump protocol + checksum-verified fetch: docs/pinning.md. Verify downloads against SHA256SUMS.txt."
          fi
