name: Release

# SUR-760 + SUR-745: on a version tag, build + publish the pinned artifacts — Android AAR +
# desktop JVM jar (SUR-760), the iOS BrairdCore.xcframework (SUR-745), and the two
# machine-consumed canon files — to one GitHub Release. Six payloads are hashed in
# SHA256SUMS.txt; with the manifest, the release has seven total assets. Consumers pin
# the tag + checksums; the `chore(core): pin
# braird-core vX.Y.Z` PR in the app repo is the integration gate (docs/pinning.md).
# Routed to release-integrity-reviewer (GATING.md §3.1): binding↔native atomicity, tag+SHA-256
# pin, 16 KB alignment (Android), version agreement.
#
# Job DAG (SUR-745 + SUR-918): validate → {build-android (ubuntu), build-ios (macos-14)} →
# validate-canon (ubuntu, read-only) → publish (ubuntu). The two build legs run in parallel off the
# same resolved commit; canon validation runs after them so the live-source check is as close as
# possible to publication. A single publish job assembles every artifact into one SHA256SUMS.txt
# and cuts the release once. Splitting the iOS leg onto a macOS runner is unavoidable (only
# xcodebuild builds an xcframework) — it carries a 10x runner-minute multiplier, but fires only on
# a version tag.
#
# Hardening (release-integrity-reviewer, SUR-760 + SUR-745):
#   - Published assets are IMMUTABLE: create-only, no --clobber. A re-run on an already-published
#     tag hard-fails — a fix to a shipped version is a NEW version, never a re-publish.
#   - `contents: write` is held by the `publish` job ALONE (SUR-745). The build legs run with the
#     default read-only token: an attacker-influenceable string never reaches a lane that can
#     write a release. The tag/version reach shell only via `env:` (never interpolated into a
#     `run:` body) and the tag is allowlist-validated in `validate` before any job consumes it.
#   - The validated tag resolves once to a commit SHA; every build and the canon handoff use that
#     SHA, and `publish` refuses a tag that moved before release creation.
#   - `validate-canon` uses the trusted current-main checker in a read-only job, with checkout
#     credentials never persisted. It hands only the two validated canon bytes to `publish`, so the
#     write-capable job receives neither `SURFC_READ_PAT` nor tagged repository code.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build a release for, e.g. v0.1.0 (only if it has no release yet)'
        required: true

# Read-only by default; only `publish` escalates to contents: write (see that job).
permissions:
  contents: read

env:
  NDK_PIN: '28.2.13676358'

jobs:
  # Validate the tag FIRST, before any build lane consumes it. Assigned via env: (not interpolated
  # into the script text). Whole-string bash `=~` match, not line-oriented grep: a multiline
  # workflow_dispatch input could otherwise pass a per-line check and smuggle a newline into
  # GITHUB_OUTPUT. Bash ERE has no REG_NEWLINE, so `$` anchors end-of-string → newline rejected.
  # The validated tag/version are exposed as job outputs the build + publish jobs pin to.
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Resolve + validate the tag
        id: v
        env:
          TAG_RAW: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          re='^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.]+)?$'
          if [[ ! "$TAG_RAW" =~ $re ]]; then
            echo "::error::refusing tag '$TAG_RAW' — expected vMAJOR.MINOR.PATCH[.-suffix]"
            exit 1
          fi
          echo "tag=$TAG_RAW" >> "$GITHUB_OUTPUT"
          echo "version=${TAG_RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Check out validated tag without persisting credentials
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.v.outputs.tag }}
          persist-credentials: false

      - name: Resolve validated tag to one exact commit
        id: commit
        run: echo "sha=$(git rev-parse --verify HEAD^{commit})" >> "$GITHUB_OUTPUT"

  # Android AAR (arm64-v8a + x86_64, 16 KB-aligned) + self-contained desktop JVM jar. Uploads both
  # as a workflow artifact for `publish` to attach — this leg never touches the release itself.
  build-android:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.sha }} # exact commit resolved from the validated tag

      # Fail-closed: the tag, the crate version, and the CHANGELOG must agree before anything builds.
      - name: Verify tag == Cargo.toml version + CHANGELOG section
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if [ "$VERSION" != "$CARGO_VER" ]; then
            echo "::error::tag $VERSION != Cargo.toml version $CARGO_VER — bump the crate + CHANGELOG in the release commit"
            exit 1
          fi
          # Treat VERSION as literal data, not an ERE: dots in 0.6.0 must not match arbitrary
          # characters. Accept either an undated heading or the repository's dated release shape.
          awk -v heading="## [$VERSION]" '
            $0 == heading { found = 1 }
            index($0, heading " - ") == 1 {
              date = substr($0, length(heading) + 4)
              if (date ~ /^[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]$/) found = 1
            }
            END { exit found ? 0 : 1 }
          ' CHANGELOG.md || {
            echo "::error::CHANGELOG.md has no exact '## [$VERSION]' section header"; exit 1; }

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # SHA-pinned (not @stable): a compromised toolchain action could inject into the shipped .so
      # BEFORE it is checksummed, and the checksum would faithfully cover the poisoned bytes.
      # SHA = dtolnay/rust-toolchain stable @ 2026-07-03.
      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      # SHA-pinned like the toolchain action above — rust-cache runs pre-compile; a compromised
      # release could poison the artifact before it is checksummed. SHA = Swatinem/rust-cache v2.9.1.
      - name: Cache cargo
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install pinned NDK ${{ env.NDK_PIN }} (16 KB-aligned)
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_PIN}" >/dev/null
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${NDK_PIN}" >> "$GITHUB_ENV"

      - name: Build AAR (cross-compile → assemble → 16 KB alignment check)
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: bash scripts/build-aar.sh "$VERSION"

      - name: Build the self-contained desktop jar
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        working-directory: bindings/kotlin
        run: ./gradlew jar --no-daemon -PcoreVersion="$VERSION"

      - name: Stage desktop jar into dist/
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: cp "bindings/kotlin/build/libs/braird-core-desktop-$VERSION.jar" dist/

      # Prove the EXACT bytes we're about to publish are self-contained: no jna.library.path, the
      # consumer resolves the native from the jar alone. Runs BEFORE the artifact is handed to publish.
      - name: Consumer round-trip against the built desktop jar
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        working-directory: bindings/consumer-smoke
        run: ./gradlew test --no-daemon -PcoreVersion="$VERSION" -PcoreJar="$GITHUB_WORKSPACE/dist/braird-core-desktop-$VERSION.jar"

      - name: Upload Android artifacts for publish
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            dist/braird-core-*.aar
            dist/braird-core-desktop-*.jar
          if-no-files-found: error
          retention-days: 1

  # iOS BrairdCore.xcframework (macOS host + iOS device + iOS sim, arm64). macOS-only: only
  # xcodebuild assembles an xcframework. Uploads the pinned zip for `publish` to attach.
  build-ios:
    needs: validate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.sha }} # exact commit resolved from the validated tag

      # Same fail-closed agreement check as the Android leg, so a mismatched tag fails this leg
      # too rather than burning macOS minutes on a build that publish would reject.
      - name: Verify tag == Cargo.toml version + CHANGELOG section
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if [ "$VERSION" != "$CARGO_VER" ]; then
            echo "::error::tag $VERSION != Cargo.toml version $CARGO_VER — bump the crate + CHANGELOG in the release commit"
            exit 1
          fi
          # Keep this literal-safe check identical to the Android leg above.
          awk -v heading="## [$VERSION]" '
            $0 == heading { found = 1 }
            index($0, heading " - ") == 1 {
              date = substr($0, length(heading) + 4)
              if (date ~ /^[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]$/) found = 1
            }
            END { exit found ? 0 : 1 }
          ' CHANGELOG.md || {
            echo "::error::CHANGELOG.md has no exact '## [$VERSION]' section header"; exit 1; }

      - name: Install Rust toolchain + iOS targets
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim

      # SHA-pinned for the same reason as the toolchain action above: rust-cache runs in the
      # pre-compile window and a compromised release could poison the artifact before it is
      # checksummed. SHA = Swatinem/rust-cache v2.9.1.
      - name: Cache cargo
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      # Builds the xcframework AND (given a version) stages dist/braird-core-<version>.xcframework.zip
      # + prints its SwiftPM checksum. build-xcframework.sh runs gen-bindings.sh, so BrairdCore.swift
      # here is regenerated from the SAME compiled lib the xcframework packages — the wrapper we test
      # and publish below is provably from this one generation run.
      - name: Build + zip BrairdCore.xcframework
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: scripts/build-xcframework.sh "$VERSION"

      # Prove the exact bytes we're about to publish work through the FFI — the iOS analog of the
      # Android consumer round-trip. `swift test` exercises the macOS-host slice; the xcodebuild run
      # exercises the ios-arm64-simulator slice on a real simulator (an arm64 macos-14 runner can
      # execute it). Both shipped, testable slices are driven before publish. The ios-arm64 DEVICE
      # slice cannot run in CI — that residual is documented in docs/pinning.md, not silently shipped.
      - name: Swift round-trip — macOS-host slice
        working-directory: bindings/swift
        run: swift test

      - name: Swift round-trip — iOS-simulator slice (arm64-sim)
        working-directory: bindings/swift
        run: |
          # Target whatever iPhone simulator the runner's Xcode provides — don't hard-pin a device
          # name/OS that a future image might drop. Fail closed if none is available.
          SIM_ID=$(xcrun simctl list devices available --json \
            | jq -r 'first(.devices[][] | select(.name | startswith("iPhone")) | .udid) // empty')
          [ -n "$SIM_ID" ] || { echo "::error::no iPhone simulator available on this runner"; exit 1; }
          echo "Testing on simulator $SIM_ID"
          xcodebuild test -scheme BrairdCore -destination "id=$SIM_ID"

      # Stage the wrapper the two round-trips just validated against this exact xcframework, so it
      # ships as a CHECKSUMMED release asset (SUR-745 review). The iOS consumer pins its SHA-256 the
      # same way it pins the zip's — the wrapper is never acquired by a mutable tag alone.
      - name: Stage BrairdCore.swift wrapper for publish
        run: cp bindings/swift/Sources/BrairdCore/BrairdCore.swift dist/BrairdCore.swift

      - name: Upload iOS artifacts for publish
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: |
            dist/braird-core-*.xcframework.zip
            dist/BrairdCore.swift
          if-no-files-found: error
          retention-days: 1

  # Validate the exact release commit's two canon fixtures against current surfc/main only after
  # both build legs pass. This job is read-only, runs the trusted checker from current main (not a
  # potentially stale tag), persists no checkout credentials, and hands only validated data bytes
  # to the write-capable publisher.
  validate-canon:
    needs: [validate, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out trusted current canon validator
        uses: actions/checkout@v4
        with:
          ref: main
          path: validator
          persist-credentials: false

      - name: Check out exact release commit canon fixtures
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.sha }}
          path: release
          persist-credentials: false

      - name: Fetch surfc/main without persisting credentials
        uses: actions/checkout@v4
        with:
          repository: braird/surfc
          ref: main
          token: ${{ secrets.SURFC_READ_PAT }}
          path: surfc
          persist-credentials: false

      - name: Set up Node for canon release validation
        uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'

      - name: Assert exact release canon assets still match surfc/main
        run: >-
          node validator/scripts/extract-great-ideas.mjs surfc
          --check release/vendored/canon/great-ideas.json
          --tree release/vendored/canon/idea-tree.yaml

      # The common parent is stripped by upload-artifact, yielding exactly the two stable asset
      # names at the artifact root when publish downloads with merge-multiple.
      - name: Upload validated canon data for publish
        uses: actions/upload-artifact@v4
        with:
          name: canon-artifacts
          path: |
            release/vendored/canon/great-ideas.json
            release/vendored/canon/idea-tree.yaml
          if-no-files-found: error
          retention-days: 1

  # Assemble four built artifacts + two machine-consumed canon files into one SHA256SUMS.txt and
  # cut the release once: six hashed payloads, seven total assets including the manifest. This is
  # the ONLY job with contents: write, and the ONLY job that touches the release — so create-only
  # immutability can't be raced by a parallel lane.
  publish:
    needs: [validate, build-android, build-ios, validate-canon]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built + validated artifacts into dist/
        uses: actions/download-artifact@v4
        with:
          path: dist
          # Flatten android-artifacts/ + ios-artifacts/ + canon-artifacts/ into dist/. The checksum
          # and gh-release steps below remain the explicit publication allowlist, so future
          # administrative artifacts cannot silently become release assets.
          merge-multiple: true

      - name: Stage SHA-256 manifest
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          cd dist
          # BrairdCore.swift and both canon files are checksummed alongside the three binaries: six
          # payloads total. Consumers pin the applicable hashes so no payload is trusted to a mutable
          # tag. Hashed here from the exact bytes about to be published — no rebuild, no re-download.
          ( sha256sum \
              "braird-core-$VERSION.aar" \
              "braird-core-desktop-$VERSION.jar" \
              "braird-core-$VERSION.xcframework.zip" \
              "BrairdCore.swift" \
              "great-ideas.json" \
              "idea-tree.yaml" | tee SHA256SUMS.txt )

      # Create-only. Published assets are immutable: if a release for this tag already exists we
      # hard-fail rather than overwrite — every consumer pin (tag + SHA-256) stays valid forever.
      - name: Publish GitHub Release + attach artifacts (create-only)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          EXPECTED_SHA: ${{ needs.validate.outputs.sha }}
        run: |
          CURRENT_SHA=$(gh api "repos/$GH_REPO/commits/$TAG" --jq .sha)
          if [ "$CURRENT_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::tag $TAG moved from validated commit $EXPECTED_SHA to $CURRENT_SHA — refusing release"
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::a release for $TAG already exists — published artifacts are immutable; cut a new version"
            exit 1
          fi
          gh release create "$TAG" \
            "dist/braird-core-$VERSION.aar" \
            "dist/braird-core-desktop-$VERSION.jar" \
            "dist/braird-core-$VERSION.xcframework.zip" \
            "dist/BrairdCore.swift" \
            "dist/great-ideas.json" \
            "dist/idea-tree.yaml" \
            "dist/SHA256SUMS.txt" \
            --title "braird-core $TAG" \
            --verify-tag \
            --notes "Pinned payloads for the Braird clients — six SHA-256-hashed payloads plus SHA256SUMS.txt (seven total release assets). Verify every download against the manifest. Pin/bump protocol: docs/pinning.md.

          - **iOS** (braird-ios): \`braird-core-$VERSION.xcframework.zip\` (arm64 iOS device + arm64 iOS simulator + an arm64 macOS-host slice) **and** \`BrairdCore.swift\` (the generated wrapper — the xcframework doesn't carry it). Pin BOTH SHA-256s from SHA256SUMS.txt; the zip's is SwiftPM's \`.binaryTarget(checksum:)\`. Do not vendor the wrapper from the tag — fetch it from this release and verify its checksum.
          - **Android** (braird-android): \`braird-core-$VERSION.aar\` (arm64-v8a + x86_64, 16 KB-aligned) + self-contained \`braird-core-desktop-$VERSION.jar\`. Add JNA 5.17.0 @aar alongside the AAR.
          - **Canon data** (native clients): \`great-ideas.json\` is the exact tag canon and \`idea-tree.yaml\` is its hierarchy metadata. Pin and verify BOTH SHA-256s from SHA256SUMS.txt."
